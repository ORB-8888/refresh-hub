<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REFRESH — International Luxury Real Estate Hub</title>
    <meta name="description" content="Premium apartments, penthouses and villas. Exclusive listings. Strong marketing & expert negotiation. Tbilisi, Georgia." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="REFRESH — International Luxury Real Estate Hub" />
    <meta property="og:description" content="Premium apartments, penthouses and villas. Exclusive listings. Strong marketing & expert negotiation." />
    <meta property="og:url" content="https://refresh-hub.com" />
    <meta property="og:image" content="https://refresh-hub.com/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Preload YouTube API for faster video start -->
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <script>
      // Start loading YouTube IFrame API immediately
      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
      window.__ytApiReady = new Promise(function(resolve) {
        window.onYouTubeIframeAPIReady = function() { resolve(); };
      });
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Refresh Luxury Real Estate Hub",
      "description": "International Luxury Real Estate Hub — Premium apartments, penthouses and villas.",
      "url": "https://refresh-hub.com",
      "logo": "https://refresh-hub.com/logo.png",
      "telephone": "+995557124000",
      "email": "contact@refresh-hub.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Merab Aleksidze St. 12",
        "addressLocality": "Tbilisi",
        "addressCountry": "GE",
        "postalCode": "0171"
      },
      "sameAs": [
        "https://www.facebook.com/RefreshLuxuryRealEstateHub/",
        "https://www.instagram.com/refresh_luxury_hub/",
        "https://tiktok.com/@refreshhub"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
